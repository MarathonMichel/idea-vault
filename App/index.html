<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Idea Vault</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#EEF1F6">
<style>
  :root{
    --paper:#EEF1F6;
    --paper-raised:#FFFFFF;
    --ink:#1B2430;
    --ink-soft:#5B6472;
    --line:#D7DCE3;
    --accent:#E8622C;
    --accent-soft:#FCE9DF;
    --accent-ink:#7A2E10;
    --mono: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    --sans: -apple-system, "SF Pro Text", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:var(--sans); height:100%;}
  body{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    overscroll-behavior-y:contain;
  }
  #app{max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

  header{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:20px 20px 12px;
  }
  header .brand{font-size:15px; font-weight:600; letter-spacing:0.02em;}
  header .brand .dot{color:var(--accent);}
  header nav{display:flex; gap:14px;}
  header nav button{
    background:none; border:none; font-family:var(--mono); font-size:12px;
    color:var(--ink-soft); padding:4px 0; cursor:pointer; letter-spacing:0.03em;
  }
  header nav button.active{color:var(--ink); border-bottom:2px solid var(--accent);}

  main{flex:1; padding:0 20px 32px; display:flex; flex-direction:column;}

  /* ---- Capture screen ---- */
  .capture-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:16px;
    padding:16px; display:flex; flex-direction:column; gap:12px;
  }
  textarea{
    width:100%; min-height:120px; resize:vertical; border:none; outline:none;
    font-family:var(--sans); font-size:17px; line-height:1.45; color:var(--ink);
    background:transparent; padding:0;
  }
  textarea::placeholder{color:#9BA4B0;}

  .tagrow{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{
    font-family:var(--mono); font-size:11.5px; letter-spacing:0.02em;
    padding:6px 10px; border-radius:20px; border:1px solid var(--line);
    background:var(--paper); color:var(--ink-soft); cursor:pointer; user-select:none;
  }
  .chip.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink);}
  .chip.add{color:var(--ink-soft); border-style:dashed;}

  .capture-actions{display:flex; align-items:center; gap:10px; margin-top:4px;}
  .mic-btn{
    width:44px; height:44px; border-radius:50%; border:1px solid var(--line);
    background:var(--paper); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex:0 0 auto; position:relative;
  }
  .mic-btn.listening{background:var(--accent); border-color:var(--accent);}
  .mic-btn svg{width:18px; height:18px;}
  .mic-btn.listening svg{stroke:#fff;}
  .mic-btn svg{stroke:var(--ink-soft); fill:none; stroke-width:2;}

  .save-btn{
    flex:1; height:44px; border-radius:22px; border:none; background:var(--ink);
    color:#fff; font-size:15px; font-weight:600; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .save-btn:active{transform:scale(0.98);}
  .save-btn.flash{background:var(--accent);}

  .status-line{
    font-family:var(--mono); font-size:11.5px; color:var(--ink-soft);
    margin-top:14px; min-height:16px; text-align:center;
  }
  .status-line.err{color:#B3261E;}

  /* ---- List screen ---- */
  .idea{
    border-bottom:1px solid var(--line); padding:14px 2px; display:flex; flex-direction:column; gap:6px;
  }
  .idea .meta{font-family:var(--mono); font-size:11px; color:var(--ink-soft); display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .idea .meta .pill{background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:2px 7px;}
  .idea .meta .status-pill{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-ink);}
  .idea.done .meta .status-pill{background:var(--paper); border-color:var(--line); color:var(--ink-soft);}
  .idea .body{font-size:15.5px; line-height:1.4;}
  .idea.done .body{color:var(--ink-soft); text-decoration:line-through; text-decoration-color:var(--line);}
  .idea.pending{opacity:0.55;}
  .done-btn{
    margin-left:auto; font-family:var(--mono); font-size:11px; letter-spacing:0.02em;
    background:none; border:1px solid var(--line); border-radius:12px; padding:3px 9px;
    color:var(--ink-soft); cursor:pointer;
  }
  .idea.done .done-btn{color:var(--accent-ink); border-color:var(--accent);}
  .empty{text-align:center; color:var(--ink-soft); font-size:14px; padding:60px 20px; line-height:1.6;}

  /* ---- Setup screen ---- */
  .setup-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:16px;
    padding:20px; display:flex; flex-direction:column; gap:14px;
  }
  .setup-card h2{margin:0; font-size:17px;}
  .setup-card p{margin:0; font-size:13.5px; color:var(--ink-soft); line-height:1.5;}
  label{font-family:var(--mono); font-size:11px; color:var(--ink-soft); letter-spacing:0.03em;}
  input[type=text], input[type=password]{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px;
    font-size:15px; font-family:var(--sans); background:var(--paper); color:var(--ink); outline:none;
  }
  input:focus{border-color:var(--accent);}
  .field{display:flex; flex-direction:column; gap:5px;}
  .setup-card button.primary{
    margin-top:4px; height:44px; border-radius:22px; border:none; background:var(--ink);
    color:#fff; font-size:15px; font-weight:600; cursor:pointer;
  }
  a{color:var(--accent-ink);}

  @keyframes spark{
    0%{box-shadow:0 0 0 0 rgba(232,98,44,0.45);}
    100%{box-shadow:0 0 0 22px rgba(232,98,44,0);}
  }
  .spark{animation:spark 0.6s ease-out;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">idea<span class="dot">·</span>vault</div>
    <nav>
      <button id="tabCapture" class="active">capture</button>
      <button id="tabHistory">history</button>
      <button id="tabSetup">setup</button>
    </nav>
  </header>
  <main id="main"></main>
</div>

<script>
const $ = s => document.querySelector(s);
const STORAGE_KEY = 'ideavault_config';
const QUEUE_KEY = 'ideavault_queue';
const PRESET_TAGS = ['claude-code','feature','bug','ux','writing','someday'];

function getConfig(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){return {};} }
function setConfig(c){ localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
function getQueue(){ try{return JSON.parse(localStorage.getItem(QUEUE_KEY))||[];}catch(e){return [];} }
function setQueue(q){ localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }

function isConfigured(){
  const c = getConfig();
  return c.token && c.owner && c.repo;
}

// ---------------- Views ----------------
let selectedTags = new Set();
let recognizing = false;

function renderCapture(){
  $('#main').innerHTML = `
    <div class="capture-card">
      <textarea id="ideaText" placeholder="What's the idea?" autofocus></textarea>
      <div class="tagrow" id="tagRow"></div>
      <div class="capture-actions">
        <button class="mic-btn" id="micBtn" title="Voice to text">
          <svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 003-3V6a3 3 0 10-6 0v6a3 3 0 003 3z"/><path d="M19 11a7 7 0 01-14 0"/><path d="M12 19v3"/></svg>
        </button>
        <button class="save-btn" id="saveBtn">Catch it</button>
      </div>
    </div>
    <div class="status-line" id="statusLine"></div>
  `;
  renderTagChips();
  $('#saveBtn').onclick = handleSave;
  $('#micBtn').onclick = handleMic;
  flushQueueIfOnline();
}

function renderTagChips(){
  const row = $('#tagRow');
  row.innerHTML = '';
  PRESET_TAGS.forEach(t=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (selectedTags.has(t) ? ' on' : '');
    chip.textContent = t;
    chip.onclick = ()=>{
      if(selectedTags.has(t)) selectedTags.delete(t); else selectedTags.add(t);
      renderTagChips();
    };
    row.appendChild(chip);
  });
  const addChip = document.createElement('div');
  addChip.className = 'chip add';
  addChip.textContent = '+ tag';
  addChip.onclick = ()=>{
    const custom = prompt('Custom tag:');
    if(custom && custom.trim()){
      selectedTags.add(custom.trim().toLowerCase().replace(/\s+/g,'-'));
      renderTagChips();
    }
  };
  row.appendChild(addChip);
}

function handleMic(){
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRec){
    setStatus('Voice input not supported on this browser — just type it.', true);
    return;
  }
  const btn = $('#micBtn');
  if(recognizing) return;
  const rec = new SpeechRec();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  recognizing = true;
  btn.classList.add('listening');
  rec.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    const ta = $('#ideaText');
    ta.value = (ta.value ? ta.value + ' ' : '') + text;
  };
  rec.onerror = ()=>{ setStatus('Voice capture failed — try typing.', true); };
  rec.onend = ()=>{ recognizing = false; btn.classList.remove('listening'); };
  rec.start();
}

function setStatus(msg, isErr){
  const el = $('#statusLine');
  if(!el) return;
  el.textContent = msg;
  el.className = 'status-line' + (isErr ? ' err' : '');
}

async function handleSave(){
  const ta = $('#ideaText');
  const text = ta.value.trim();
  if(!text) return;
  const idea = {
    text,
    tags: Array.from(selectedTags),
    date: new Date().toISOString()
  };
  ta.value = '';
  selectedTags = new Set();
  renderTagChips();

  const btn = $('#saveBtn');
  btn.classList.add('flash','spark');
  setTimeout(()=>btn.classList.remove('flash','spark'), 650);

  if(!isConfigured()){
    queueIdea(idea);
    setStatus('Saved locally. Add GitHub setup to sync everywhere.');
    return;
  }
  try{
    await pushIdea(idea);
    setStatus('Caught — synced to ' + getConfig().repo + '.');
  }catch(e){
    queueIdea(idea);
    setStatus('Offline or sync failed — queued (' + getQueue().length + ' waiting).', true);
  }
}

function queueIdea(idea){
  const q = getQueue();
  q.push(idea);
  setQueue(q);
}

async function flushQueueIfOnline(){
  if(!isConfigured() || !navigator.onLine) return;
  const q = getQueue();
  if(!q.length) return;
  const remaining = [];
  for(const idea of q){
    try{ await pushIdea(idea); } catch(e){ remaining.push(idea); }
  }
  setQueue(remaining);
  if(remaining.length === 0 && q.length > 0){
    setStatus('Synced ' + q.length + ' queued idea(s).');
  }
}
window.addEventListener('online', flushQueueIfOnline);

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,40) || 'idea';
}

async function pushIdea(idea){
  const cfg = getConfig();
  const d = new Date(idea.date);
  const stamp = d.toISOString().slice(0,16).replace(/[:T]/g,'-');
  const filename = `ideas/${stamp}-${slugify(idea.text)}.md`;
  const frontmatter = [
    '---',
    `date: ${idea.date}`,
    `tags: [${idea.tags.join(', ')}]`,
    'status: inbox',
    'source: mobile',
    '---',
    '',
    idea.text,
    ''
  ].join('\n');

  const contentB64 = b64EncodeUnicode(frontmatter);
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(filename).replace(/%2F/g,'/')}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${cfg.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: `idea: ${idea.text.slice(0,60)}`,
      content: contentB64
    })
  });
  if(!res.ok){
    const body = await res.text().catch(()=> '');
    throw new Error('GitHub API error ' + res.status + ' ' + body);
  }
}

function b64EncodeUnicode(str){
  return btoa(unescape(encodeURIComponent(str)));
}

// ---------------- History ----------------
async function renderHistory(){
  $('#main').innerHTML = `<div id="historyList"><div class="empty">Loading…</div></div>`;
  const list = $('#historyList');
  const queued = getQueue();

  if(!isConfigured()){
    list.innerHTML = queued.length
      ? queued.map(renderPendingIdea).join('')
      : `<div class="empty">No ideas yet. Finish setup to sync, or just start capturing — nothing is lost.</div>`;
    return;
  }

  try{
    const cfg = getConfig();
    const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/ideas`;
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' } });
    if(!res.ok) throw new Error('list failed');
    const files = (await res.json()).filter(f => f.name.endsWith('.md')).sort((a,b)=> b.name.localeCompare(a.name)).slice(0,30);

    const items = await Promise.all(files.map(async f=>{
      const r = await fetch(f.url, { headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' } });
      const data = await r.json();
      const content = decodeURIComponent(escape(atob(data.content)));
      const parsed = parseIdeaMd(content);
      parsed.path = f.path;
      parsed.sha = data.sha;
      return parsed;
    }));

    // Open ideas first, done ideas after — so the inbox stays the focus.
    items.sort((a,b)=>{
      if(a.status === b.status) return b.date.localeCompare(a.date);
      return a.status === 'done' ? 1 : -1;
    });

    let html = queued.map(renderPendingIdea).join('');
    html += items.map(renderIdea).join('');
    list.innerHTML = html || `<div class="empty">No ideas yet. Go catch one.</div>`;

    list.querySelectorAll('[data-toggle]').forEach(btn=>{
      btn.onclick = () => toggleStatus(btn.dataset.toggle);
    });
  }catch(e){
    list.innerHTML = (queued.length ? queued.map(renderPendingIdea).join('') : '') +
      `<div class="empty">Couldn't load history (offline, or check setup).</div>`;
  }
}

function parseIdeaMd(content){
  const m = content.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if(!m) return { text: content, tags: [], date: '', status: 'inbox' };
  const fm = m[1];
  const body = m[2].trim();
  const dateMatch = fm.match(/date:\s*(.+)/);
  const tagsMatch = fm.match(/tags:\s*\[(.*)\]/);
  const statusMatch = fm.match(/status:\s*(\S+)/);
  return {
    text: body,
    date: dateMatch ? dateMatch[1].trim() : '',
    tags: tagsMatch ? tagsMatch[1].split(',').map(t=>t.trim()).filter(Boolean) : [],
    status: statusMatch ? statusMatch[1].trim() : 'inbox'
  };
}

async function toggleStatus(path){
  const btn = document.querySelector(`[data-toggle="${path}"]`);
  const card = btn.closest('.idea');
  const newStatus = card.dataset.status === 'done' ? 'inbox' : 'done';
  btn.disabled = true;
  btn.textContent = '…';
  try{
    const cfg = getConfig();
    const getUrl = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
    const r = await fetch(getUrl, { headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json' } });
    const data = await r.json();
    const raw = decodeURIComponent(escape(atob(data.content)));
    const updated = raw.replace(/status:\s*\S+/, `status: ${newStatus}`);
    const putRes = await fetch(getUrl, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${cfg.token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: newStatus === 'done' ? 'idea: mark done' : 'idea: reopen',
        content: b64EncodeUnicode(updated),
        sha: data.sha
      })
    });
    if(!putRes.ok) throw new Error('update failed');
    renderHistory();
  }catch(e){
    btn.disabled = false;
    setStatus('Could not update — try again.', true);
  }
}

function renderIdea(i){
  const d = i.date ? new Date(i.date) : null;
  const when = d ? d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}) : '';
  const isDone = i.status === 'done';
  return `<div class="idea${isDone ? ' done' : ''}" data-status="${i.status}">
    <div class="meta">
      <span>${when}</span>
      <span class="pill status-pill">${isDone ? 'done' : 'inbox'}</span>
      ${i.tags.map(t=>`<span class="pill">${t}</span>`).join('')}
      <button class="done-btn" data-toggle="${i.path}">${isDone ? 'Reopen' : 'Mark done'}</button>
    </div>
    <div class="body">${escapeHtml(i.text)}</div>
  </div>`;
}
function renderPendingIdea(i){
  const d = new Date(i.date);
  const when = d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  return `<div class="idea pending">
    <div class="meta"><span>${when}</span><span class="pill">syncing…</span>${i.tags.map(t=>`<span class="pill">${t}</span>`).join('')}</div>
    <div class="body">${escapeHtml(i.text)}</div>
  </div>`;
}
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------- Setup ----------------
function renderSetup(){
  const cfg = getConfig();
  $('#main').innerHTML = `
    <div class="setup-card">
      <h2>Connect your GitHub repo</h2>
      <p>Ideas are saved as markdown files in a repo you own. Create a small repo first (public or private, doesn't matter), then fill this in.</p>
      <div class="field">
        <label>GITHUB USERNAME</label>
        <input type="text" id="cfgOwner" value="${cfg.owner||''}" placeholder="e.g. jsmith">
      </div>
      <div class="field">
        <label>REPO NAME</label>
        <input type="text" id="cfgRepo" value="${cfg.repo||''}" placeholder="e.g. idea-vault">
      </div>
      <div class="field">
        <label>PERSONAL ACCESS TOKEN</label>
        <input type="password" id="cfgToken" value="${cfg.token||''}" placeholder="fine-grained token, Contents: read/write">
      </div>
      <button class="primary" id="saveCfg">Save connection</button>
      <p>Token stays only on this device (browser local storage) — it's never sent anywhere except GitHub's API. Create one at
        <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">github.com/settings/personal-access-tokens</a>,
        scoped to just this repo, with Contents set to Read and write.</p>
    </div>
    <div class="status-line" id="statusLine"></div>
  `;
  $('#saveCfg').onclick = ()=>{
    setConfig({
      owner: $('#cfgOwner').value.trim(),
      repo: $('#cfgRepo').value.trim(),
      token: $('#cfgToken').value.trim()
    });
    setStatus('Saved. Switch to capture and try it.');
    flushQueueIfOnline();
  };
}

// ---------------- Tabs ----------------
function setActiveTab(id){
  ['tabCapture','tabHistory','tabSetup'].forEach(t=> $('#'+t).classList.toggle('active', t===id));
}
$('#tabCapture').onclick = ()=>{ setActiveTab('tabCapture'); renderCapture(); };
$('#tabHistory').onclick = ()=>{ setActiveTab('tabHistory'); renderHistory(); };
$('#tabSetup').onclick = ()=>{ setActiveTab('tabSetup'); renderSetup(); };

renderCapture();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
